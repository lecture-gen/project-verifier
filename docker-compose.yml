services:
  api:
    container_name: dialearn-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      APP_SQLITE_PATH: /app/data/app.db
      APP_ARTIFACT_DIR: /app/data/artifacts
      PUBLIC_WEB_BASE_URL: ${PUBLIC_WEB_BASE_URL:-https://dialearn.presso.ac}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://dialearn.presso.ac,http://localhost:3000}
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - dialearn_app_data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - proxy

  web:
    container_name: dialearn-web
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # next build 가 client bundle 에 인라인하는 공개 API base.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://dialearn.presso.ac}
    restart: unless-stopped
    environment:
      # 서버 컴포넌트 / Route Handler 가 docker network 안에서 api 컨테이너로 직접 호출.
      INTERNAL_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://dialearn.presso.ac}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - proxy

  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: dialearn-qdrant
    restart: unless-stopped
    volumes:
      - dialearn_qdrant_storage:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c '</dev/tcp/127.0.0.1/6333'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - proxy

volumes:
  dialearn_app_data:
    external: true
    name: dialearn_app_data
  dialearn_qdrant_storage:
    external: true
    name: dialearn_qdrant_storage

networks:
  proxy:
    external: true
    name: proxy
